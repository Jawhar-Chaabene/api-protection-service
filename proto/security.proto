syntax = "proto3";

package security;

option go_package = "api-protection/proto/genProto";

service SecurityService {
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}

message VerifyRequest {
  string path = 1;
  string method = 2;
  string client_ip = 3;
}

message VerifyResponse {
  Verdict verdict = 1;
  string reason = 2;
}

enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  ALLOW = 1;
  DENY = 2;
}
